<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- PWA / ホーム画面追加 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="kakeibo">
<meta name="theme-color" content="#9ec4a0">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">

<title>kakeibo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500;700&family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
/* =========================================================
   Base / Tokens
========================================================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  /* ── Mint palette (new logo) ── */
  --green-main:  #9ec4a0;   /* 淡いミントグリーン */
  --green-deep:  #6a9e6e;
  --green-light: #cce4cc;
  --green-dim:   rgba(158,196,160,0.15);
  --green-glow:  rgba(158,196,160,0.25);

  /* ── Neutrals ── */
  --bg:      #f7f9f7;
  --bg2:     #eef4ee;
  --card:    #ffffff;
  --surface: #f2f7f2;
  --surface-soft: rgba(255,255,255,0.65);

  /* ── Text ── */
  --text:    #2c3a2e;   /* ロゴの濃いダークグリーン寄り */
  --muted:   #7a9480;
  --muted2:  #b4c8b6;

  /* ── Semantic ── */
  --income:       #5fa87a;
  --income-dim:   rgba(95,168,122,0.12);
  --expense:      #d97b5e;
  --expense-dim:  rgba(217,123,94,0.12);
  --saving:       #6a9fc0;
  --saving-dim:   rgba(106,159,192,0.12);

  --border:       #dde8dd;
  --checked:      #aecfb0;

  --radius-sm:  10px;
  --radius:     16px;
  --radius-lg:  22px;
  --radius-xl:  28px;

  --shadow-sm:   0 2px 8px  rgba(44,58,46,0.06);
  --shadow-md:   0 6px 20px rgba(44,58,46,0.09);
  --shadow-card: 0 12px 36px rgba(44,58,46,0.12);
}

body {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  min-height: 100vh;
  color: var(--text);
  padding-bottom: 80px;
  background:
    radial-gradient(ellipse at top left,  rgba(158,196,160,0.20) 0%, transparent 45%),
    radial-gradient(ellipse at bottom right, rgba(106,159,192,0.08) 0%, transparent 40%),
    linear-gradient(180deg, #f5f9f5 0%, var(--bg) 60%);
}

input, select, textarea { font-size: 16px !important; }

input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
input[type="number"] { -moz-appearance: textfield; }

.container { max-width: 430px; margin: 0 auto; padding: 0 18px; }

/* =========================================================
   Header
========================================================= */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 0 16px;
}

.app-title {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--text);
  line-height: 1;
}

.month-nav {
  display: inline-flex;
  align-items: center;
  gap: 0;
  background: var(--card);
  border-radius: 99px;
  padding: 4px;
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow-sm);
}

.nav-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: transparent; border: none;
  color: var(--muted); font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s;
}
.nav-btn:hover { background: var(--bg2); color: var(--text); }

.month-display {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  min-width: 76px;
  text-align: center;
  color: var(--text);
  font-weight: 400;
  letter-spacing: 0.5px;
}

/* =========================================================
   Summary Card
========================================================= */
/* =========================================================
   Summary Card — ロゴと世界観を合わせたナチュラルデザイン
========================================================= */
.summary-card {
  background: linear-gradient(150deg, #c8dfc6 0%, #daecd8 45%, #eaf4e8 100%);
  border-radius: 32px 28px 36px 30px / 30px 34px 28px 32px; /* 有機的な角丸 */
  padding: 24px 22px 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
  border: 1.5px solid #a8c8a6;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.60),
    0 8px 32px rgba(70,110,70,0.14);
}

/* 右上の薄いミント円 — ロゴの blob を模倣 */
.summary-card::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 160px; height: 160px; border-radius: 50%;
  background: rgba(120,180,120,0.20);
  pointer-events: none;
}
.summary-card::after {
  content: '';
  position: absolute; bottom: -30px; left: -20px;
  width: 100px; height: 80px; border-radius: 50%;
  background: rgba(120,180,120,0.13);
  pointer-events: none;
}

.summary-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 18px;
  position: relative; z-index: 1;
}

.summary-label-sm {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 5px;
  font-family: 'DM Mono', monospace;
}

.balance-amount {
  font-size: 38px;
  font-weight: 700;
  letter-spacing: -1px;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.balance-amount.positive { color: var(--green-deep); }
.balance-amount.negative { color: var(--expense); }

.saving-badge {
  background: rgba(255,255,255,0.55);
  border: 1.5px solid #a8c8a6;
  border-radius: 14px;
  padding: 8px 12px;
  text-align: right;
  min-width: 110px;
}
.saving-badge-label {
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 5px;
}
.saving-badge-amount {
  font-size: 20px; font-weight: 700;
  color: var(--saving); white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

/* 仕切り線 */
.summary-divider {
  height: 1px;
  background: #a8c8a6;
  margin-bottom: 16px;
  position: relative; z-index: 1;
}

.summary-pills {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 18px;
  position: relative; z-index: 1;
}

.pill {
  border-radius: 14px;
  padding: 10px 12px;
  background: rgba(255,255,255,0.50);
  border: 1.5px solid #a8c8a6;
}
.pill.income-pill  { border-top: 2.5px solid var(--green-deep); }
.pill.expense-pill { border-top: 2.5px solid #e06040; }

.pill-label {
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 5px; font-family: 'DM Mono', monospace;
}
.pill-amount {
  display: block; width: 100%; text-align: right; white-space: nowrap;
  font-family: 'DM Mono', monospace; font-size: 25px;
  font-variant-numeric: tabular-nums;
}
.pill-amount.income  { color: var(--green-deep); }
.pill-amount.expense { color: #e06040; }

.progress-wrap {
  background: rgba(255,255,255,0.6);
  border: 1px solid #d8ebd8;
  border-radius: 99px; height: 11px; overflow: hidden;
  position: relative; z-index: 1;
}
.progress-bar {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, #6aaa6e, var(--green-deep));
  box-shadow: 0 2px 6px rgba(100,160,100,0.35);
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}
.progress-bar.over { background: linear-gradient(90deg, #ff9a80, #e06040); box-shadow: 0 2px 6px rgba(220,100,80,0.30); }

/* =========================================================
   Compare Bar
========================================================= */
.compare-bar {
  display: none;
  background: var(--card); border-radius: var(--radius);
  padding: 12px 16px; margin-bottom: 14px;
  border: 1.5px solid var(--border); box-shadow: var(--shadow-sm);
}
.compare-title {
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px; font-family: 'DM Mono', monospace;
}
.compare-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.compare-item { text-align: center; }
.compare-item-label { font-size: 9px; color: var(--muted); margin-bottom: 3px; }
.compare-item-val {
  font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
  font-variant-numeric: tabular-nums;
}

/* =========================================================
   Tabs
========================================================= */
.tabs-wrap {
  margin-bottom: 14px;
  position: sticky; top: 0; z-index: 10;
  padding: 8px 0 4px;
  background: linear-gradient(to bottom, var(--bg) 78%, transparent);
}
.tabs {
  display: flex; background: var(--card); border-radius: 99px;
  padding: 4px; border: 1.5px solid var(--border); gap: 2px;
  box-shadow: var(--shadow-sm);
}
.tab-btn {
  flex: 1; padding: 8px 6px; border: none; border-radius: 99px;
  background: transparent; color: var(--muted);
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 11px; font-weight: 500; cursor: pointer;
  white-space: nowrap; transition: all 0.2s;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.tab-btn.active {
  background: var(--green-main); color: white; font-weight: 700;
  box-shadow: 0 2px 10px var(--green-glow);
}
.tab-icon {
  font-size: 15px; line-height: 1;
}
.tab-count {
  font-family: 'DM Mono', monospace;
  font-size: 9px; opacity: 0.60; margin-left: 1px;
}

/* =========================================================
   Panels / Items
========================================================= */
.panel { display: none; }
.panel.active { display: block; animation: fadeIn 0.18s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}

.item {
  background: var(--card); border-radius: var(--radius);
  margin-bottom: 8px; border: 1.5px solid transparent;
  overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s;
  box-shadow: var(--shadow-sm);
}
.item:hover { border-color: var(--border); box-shadow: var(--shadow-md); }

.item-inner {
  display: flex; align-items: center; gap: 10px;
  min-height: 58px; padding: 13px 14px; cursor: pointer;
}
.item.checked .item-inner { background: #f7faf8; }

.checkbox {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s;
}
.item.checked .checkbox { background: var(--green-main); border-color: var(--green-main); }

.checkmark {
  width: 9px; height: 6px;
  border-left: 2px solid white; border-bottom: 2px solid white;
  transform: rotate(-45deg) translateY(-1px); display: none;
}
.item.checked .checkmark { display: block; }

.item-name {
  flex: 1; min-width: 0; font-size: 14px; font-weight: 500;
  color: var(--text); line-height: 1.35;
}
.item.checked .item-name {
  color: var(--muted);
  text-decoration: line-through;
  text-decoration-color: var(--muted);  /* テキストと同色にして線をはっきり */
  text-decoration-thickness: 2px;       /* 線を太くして視認性UP */
}

.item-amount {
  font-family: 'DM Mono', monospace; font-size: 14px;
  color: var(--muted); background: var(--surface);
  min-width: 72px; text-align: right;
  padding: 3px 8px; border-radius: 8px; flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.item-amount.clickable {
  cursor: pointer; border-bottom: 1.5px dashed var(--muted2);
}
.item-amount.clickable:hover {
  background: var(--green-dim); border-bottom-color: var(--green-main); color: var(--text);
}
.item.checked .item-amount {
  color: var(--muted); border-bottom-color: transparent; pointer-events: none;
}
.income-amt { color: var(--income); }
.saving-amt { color: var(--saving); }

.item-actions { display: flex; gap: 6px; flex-shrink: 0; }

.item-btn {
  width: 32px; height: 32px; border-radius: 10px; border: none;
  background: var(--surface); color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s; font-size: 20px;
}
.item-btn:hover    { background: var(--bg2); color: var(--text); }
.log-btn:hover     { color: var(--income);  background: var(--income-dim); }
.del-btn           { background: transparent; color: var(--muted2); }
.del-btn:hover     { color: var(--expense); background: var(--expense-dim); }

/* =========================================================
   Log Panel
========================================================= */
.log-panel {
  display: none;
  background: linear-gradient(180deg, #edf5ef 0%, #e5f0e8 100%);
  border-top: 1.5px solid var(--border);
  padding: 14px; animation: fadeIn 0.15s ease;
}
.item.log-open .log-panel { display: block; }

.log-title {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px; font-family: 'DM Mono', monospace;
}
.log-title::before { content: "🧾"; font-size: 16px; }

.log-entries {
  max-height: 200px;       /* 約4件分で固定 */
  overflow-y: auto;
  margin-bottom: 10px;
  /* スクロールバーをなめらかに */
  scrollbar-width: thin;
  scrollbar-color: var(--green-light) transparent;
}
.log-entries::-webkit-scrollbar { width: 4px; }
.log-entries::-webkit-scrollbar-track { background: transparent; }
.log-entries::-webkit-scrollbar-thumb { background: var(--green-light); border-radius: 99px; }

.log-entry {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.65); border: 1px solid rgba(220,232,224,0.8);
  border-radius: 12px; padding: 8px 10px; margin-bottom: 6px;
}
.log-entry-note { flex: 1; min-width: 0; font-size: 13px; font-weight: 500; color: var(--text); }
.log-entry-amt {
  font-family: 'DM Mono', monospace; font-size: 13px;
  color: var(--muted); background: rgba(245,250,246,0.9);
  padding: 3px 8px; border-radius: 8px; cursor: pointer;
  font-variant-numeric: tabular-nums;
}
.log-entry-del {
  width: 22px; height: 22px; border-radius: 7px; border: none;
  background: rgba(255,255,255,0.7); color: var(--muted2);
  font-size: 11px; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.log-entry-del:hover { color: var(--expense); background: var(--expense-dim); }

.log-entry-edit-amt {
  width: 90px; font-family: 'DM Mono', monospace; font-size: 13px;
  color: var(--text); border: none; border-bottom: 1.5px solid var(--green-main);
  background: transparent; outline: none; text-align: right;
}

.log-total {
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(255,255,255,0.65); border: 1px solid rgba(220,232,224,0.8);
  border-radius: 12px; padding: 9px 12px; margin: 10px 0 2px;
}
.log-total-label { font-size: 11px; color: var(--muted); }
.log-total-amt   { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--text); font-weight: 700; font-variant-numeric: tabular-nums; }

.log-add-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 82px 40px 40px 40px;
  align-items: center; gap: 6px;
  background: rgba(255,255,255,0.55);
  border: 1.5px solid rgba(220,232,224,0.8);
  border-radius: 14px; padding: 8px;
  margin-top: 10px;
}

.log-add-note, .log-add-amt {
  border-radius: 10px; border: 1.5px solid transparent;
  background: white; color: var(--text); outline: none;
}
.log-add-note {
  min-width: 0; width: 100%; padding: 7px 9px;
  font-family: 'M PLUS Rounded 1c', sans-serif;
}
.log-add-amt {
  width: 82px; padding: 7px 8px;
  font-family: 'DM Mono', monospace;
}
.log-add-note:focus, .log-add-amt:focus {
  border-color: var(--green-main);
  box-shadow: 0 0 0 3px var(--green-dim);
}
.log-add-note::placeholder, .log-add-amt::placeholder { color: var(--muted2); }

.log-add-btn {
  width: 40px; height: 40px; min-width: 40px;
  border-radius: 12px; border: none;
  background: var(--green-main); color: white;
  font-size: 34px; font-weight: 400; cursor: pointer;
  box-shadow: 0 4px 10px var(--green-glow);
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
  transition: all 0.15s;
}
.log-add-btn:hover { background: var(--green-deep); }

.undo-log-btn {
  background: white;
  color: var(--green-deep);
  border: 1.5px solid var(--green-light);
  font-size: 17px; font-weight: 700;
  box-shadow: var(--shadow-sm);
}
.undo-log-btn:hover { background: var(--green-dim); }
.undo-log-btn:disabled {
  opacity: 0.35; filter: grayscale(0.4);
  cursor: not-allowed; box-shadow: none;
}

/* =========================================================
   Add Forms / Empty
========================================================= */
.add-section {
  background: var(--card); border-radius: var(--radius);
  padding: 10px; border: 1.5px solid var(--border);
  margin-top: 10px; box-shadow: var(--shadow-sm);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.add-section:focus-within {
  border-color: var(--green-main);
  box-shadow: 0 0 0 3px var(--green-dim);
}

.add-label {
  font-size: 10px; letter-spacing: 1.4px; text-transform: uppercase;
  color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 8px;
}

.add-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 88px 40px;
  gap: 7px; align-items: center;
}

.add-input, .add-amount {
  min-width: 0; width: 100%;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 10px; color: var(--text); outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.add-input {
  padding: 9px 10px;
  font-family: 'M PLUS Rounded 1c', sans-serif;
}
.add-amount {
  width: 88px; padding: 9px 8px;
  font-family: 'DM Mono', monospace;
}
.add-input:focus, .add-amount:focus {
  border-color: var(--green-main);
  box-shadow: 0 0 0 3px var(--green-dim);
}
.add-input::placeholder, .add-amount::placeholder { color: var(--muted2); }

.add-btn {
  width: 40px; height: 40px; min-width: 40px;
  border-radius: 12px; background: var(--green-main); border: none;
  color: white; font-size: 24px; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 12px var(--green-glow);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.add-btn:hover  { background: var(--green-deep); }
.add-btn:active { transform: scale(0.92); }

.empty-state {
  text-align: center;
  padding: 32px 16px;
  color: var(--muted2); font-size: 13px;
  background: rgba(255,255,255,0.55);
  border: 1.5px dashed var(--border);
  border-radius: var(--radius); margin-bottom: 8px;
  line-height: 1.7;
}
.empty-state-icon {
  font-size: 32px;
  display: block;
  margin-bottom: 8px;
  opacity: 0.75;
}
.empty-state-title {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 4px;
}
.empty-state-sub {
  display: block;
  font-size: 11px;
  color: var(--muted2);
}

/* =========================================================
   Modals / Toasts
========================================================= */
.confirm-overlay, .toast-overlay {
  position: fixed; inset: 0;
  background: rgba(47,61,53,0.40);
  backdrop-filter: blur(4px);
  display: none; align-items: flex-end;
  justify-content: center; padding: 0 16px 28px;
}
.confirm-overlay { z-index: 200; }
.toast-overlay   { z-index: 100; }
.confirm-overlay.visible,
.toast-overlay.visible { display: flex; animation: fadeO 0.2s ease; }
@keyframes fadeO { from { opacity: 0; } to { opacity: 1; } }

.confirm-sheet, .toast-sheet {
  width: 100%; max-width: 398px;
  background: var(--card); border-radius: var(--radius-xl);
  padding: 24px; border: 1.5px solid var(--border);
  box-shadow: 0 -18px 54px rgba(47,61,53,0.15);
  animation: slideU 0.28s cubic-bezier(0.4,0,0.2,1);
}
@keyframes slideU {
  from { transform: translateY(22px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.confirm-tag, .toast-tag {
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 8px; font-family: 'DM Mono', monospace;
}
.confirm-title   { font-size: 16px; color: var(--text); margin-bottom: 8px; font-weight: 700; }
.confirm-message { font-size: 13px; color: var(--muted); line-height: 1.65; margin-bottom: 14px; }
.confirm-check {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--muted); margin-bottom: 18px;
}
.confirm-check input { width: 16px; height: 16px; accent-color: var(--green-main); }

<body>
<div class="container">

  <!-- Header -->

  <div class="compare-bar" id="compareBar">

    <div class="compare-grid">
      <div class="compare-item"><div class="compare-item-label">収入</div><div class="compare-item-val" id="cmpIncome">—</div></div>
      <div class="compare-item"><div class="compare-item-label">支出</div><div class="compare-item-val" id="cmpExpense">—</div></div>

        <input class="add-amount" id="incomeAmount" placeholder="金額" type="number">

  <div class="panel" id="panel-saving">

<!-- Delete undo -->

</div>

<!-- Confirm -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-sheet">
    <div class="confirm-tag">確認</div>

    <label class="confirm-check">

<!-- Merge toast -->
<div class="toast-overlay" id="toastOverlay" onclick="closeToast(event)">
  <div class="toast-sheet">
    <div class="toast-tag">重複する項目</div>
    <div class="toast-title" id="toastTitle"></div>

    </div>

      <button class="toast-btn primary"   id="toastMergeBtn">合算する</button>
      <button class="toast-btn secondary" id="toastAddBtn">別で追加</button>
      <button class="toast-btn close-btn" onclick="dismissToast()">✕</button>
    </div>

<script>
/* =========================================================
   XSS対策
========================================================= */
function escHtml(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

/* =========================================================
   Data
========================================================= */
const STORAGE_KEY = 'kakeibo_general_v1';
const CONFIRM_KEY = 'kakeibo_confirm_settings_v3';

const DEFAULT_FIXED = [
  { id:1, name:'家賃',   amount:0, checked:false },
  { id:2, name:'水道代', amount:0, checked:false },
  { id:3, name:'電気代', amount:0, checked:false },
  { id:4, name:'ガス代', amount:0, checked:false },
  { id:5, name:'通信費', amount:0, checked:false },
  { id:6, name:'保険料', amount:0, checked:false },
  { id:7, name:'サブスク', amount:0, checked:false },
];
const DEFAULT_INCOMES = [
  { id:1, name:'給与',    amount:0, checked:false },
  { id:2, name:'副業',    amount:0, checked:false },
  { id:3, name:'臨時収入', amount:0, checked:false },
];

let months = [{
  year: 2026, month: 4,
  fixed: JSON.parse(JSON.stringify(DEFAULT_FIXED)),
  variable: [
    { id:9,  name:'食費',   amount:0, checked:false, logs:[] },
    { id:10, name:'日用品', amount:0, checked:false, logs:[] },
    { id:11, name:'交通費', amount:0, checked:false, logs:[] },
    { id:12, name:'外食',   amount:0, checked:false, logs:[] },
    { id:13, name:'美容',   amount:0, checked:false, logs:[] },
    { id:14, name:'医療',   amount:0, checked:false, logs:[] },
    { id:15, name:'衣服',   amount:0, checked:false, logs:[] },
    { id:16, name:'趣味',   amount:0, checked:false, logs:[] },
    { id:17, name:'交際費', amount:0, checked:false, logs:[] },
    { id:18, name:'その他', amount:0, checked:false, logs:[] },
  ],
  incomes: JSON.parse(JSON.stringify(DEFAULT_INCOMES)),
  savings: [{ id:19, name:'貯金', amount:0, checked:false, logs:[] }],
}];

let currentMonthIdx      = 0;
let nextId               = 100;
let nextLogId            = 1000;
let logOpenId            = null;
let itemUndoStack        = {};
let itemRedoStack        = {};
let pendingConfirmAction = null;
let lastDeletedItem      = null;
let deleteUndoTimer      = null;

const getData = () => months[currentMonthIdx];
Object.defineProperty(window, 'data', { get: getData });

function getList(type, month) {
  const m = month ?? getData();
  if (type === 'fixed')    return m.fixed;
  if (type === 'variable') return m.variable;
  if (type === 'income')   return m.incomes;
  if (type === 'saving')   return m.savings;
  return [];
}
function isLoggableType(type) { return type === 'variable' || type === 'saving'; }
function findLoggableItem(id) {
  return data.variable.find(i => i.id === id) || data.savings.find(i => i.id === id);
}
function fmt(n) { return '¥' + Math.abs(n || 0).toLocaleString(); }
function resetFocusAndZoom() {
  document.activeElement?.blur();
  setTimeout(() => window.scrollTo({ top: window.scrollY, behavior: 'auto' }), 0);
}

/* =========================================================
   Storage
========================================================= */
function normalizeLoggable(list) {
  list.forEach(item => {
    if (!item.logs) item.logs = [];
    if (item.logs.length > 0)
      item.amount = item.logs.reduce((s,l) => s + (parseInt(l.amount)||0), 0);
    else if (typeof item.amount !== 'number')
      item.amount = parseInt(item.amount) || 0;
  });
}
function normalizeData() {
  months.forEach(m => {
    if (!m.fixed)    m.fixed    = [];
    if (!m.variable) m.variable = [];
    if (!m.incomes)  m.incomes  = [];
    if (!m.savings)  m.savings  = [];
    normalizeLoggable(m.variable);
    normalizeLoggable(m.savings);
  });
}
function saveState() {
  normalizeData();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(
    { months, currentMonthIdx, nextId, nextLogId, itemUndoStack, itemRedoStack }
  ));
}
function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) { normalizeData(); return; }
  try {
    const s = JSON.parse(raw);
    if (Array.isArray(s.months))             months          = s.months;
    if (Number.isInteger(s.currentMonthIdx)) currentMonthIdx = s.currentMonthIdx;
    if (s.nextId)        nextId        = s.nextId;
    if (s.nextLogId)     nextLogId     = s.nextLogId;
    if (s.itemUndoStack) itemUndoStack = s.itemUndoStack;
    if (s.itemRedoStack) itemRedoStack = s.itemRedoStack;
  } catch(e) { console.warn('load error', e); }
  normalizeData();
}

/* =========================================================
   Confirm
========================================================= */
function loadConfirmSettings() {
  try { return JSON.parse(localStorage.getItem(CONFIRM_KEY)) || {}; }
  catch(e) { return {}; }
}
function saveConfirmSetting(key, hide) {
  const s = loadConfirmSettings(); s[key] = !!hide;
  localStorage.setItem(CONFIRM_KEY, JSON.stringify(s));
}
function confirmAction({ actionKey, requiresConfirm=false, title, message, callback }) {
  if (!requiresConfirm) { callback(); return; }
  const s = loadConfirmSettings();
  if (s[actionKey]) { callback(); return; }
  pendingConfirmAction = { actionKey, callback };
  document.getElementById('confirmTitle').textContent   = title   || '本当に実行しますか？';
  document.getElementById('confirmMessage').textContent = message || 'この操作を実行します。';
  document.getElementById('confirmDontShow').checked    = false;
  document.getElementById('confirmOverlay').classList.add('visible');
}
function cancelConfirm() {
  pendingConfirmAction = null;
  document.getElementById('confirmOverlay').classList.remove('visible');
}
function runConfirm() {
  if (!pendingConfirmAction) return;
  if (document.getElementById('confirmDontShow').checked)
    saveConfirmSetting(pendingConfirmAction.actionKey, true);
  const cb = pendingConfirmAction.callback;
  pendingConfirmAction = null;
  document.getElementById('confirmOverlay').classList.remove('visible');
  cb();
}

/* =========================================================
   Undo / Redo
========================================================= */
function itemKey(id) {
  const d = getData();
  return `${d.year}-${String(d.month).padStart(2,'0')}-${id}`;
}
function snapshotItem(item) {
  const k = itemKey(item.id);
  if (!itemUndoStack[k]) itemUndoStack[k] = [];
  itemUndoStack[k].push(JSON.stringify({ amount: item.amount, logs: JSON.parse(JSON.stringify(item.logs||[])) }));
  if (itemUndoStack[k].length > 20) itemUndoStack[k].shift();
  itemRedoStack[k] = [];
}
function canUndoItem(id) { const s = itemUndoStack[itemKey(id)]; return !!(s && s.length); }
function canRedoItem(id) { const s = itemRedoStack[itemKey(id)]; return !!(s && s.length); }

function undoItem(id, e) {
  e && e.stopPropagation();
  const item = findLoggableItem(id); if (!item) return;
  const k = itemKey(id), stack = itemUndoStack[k];
  if (!stack?.length) return;
  if (!itemRedoStack[k]) itemRedoStack[k] = [];
  itemRedoStack[k].push(JSON.stringify({ amount: item.amount, logs: JSON.parse(JSON.stringify(item.logs||[])) }));
  const prev = JSON.parse(stack.pop());
  item.amount = prev.amount||0; item.logs = prev.logs||[];
  saveState(); render();
}
function redoItem(id, e) {
  e && e.stopPropagation();
  const item = findLoggableItem(id); if (!item) return;
  const k = itemKey(id), stack = itemRedoStack[k];
  if (!stack?.length) return;
  if (!itemUndoStack[k]) itemUndoStack[k] = [];
  itemUndoStack[k].push(JSON.stringify({ amount: item.amount, logs: JSON.parse(JSON.stringify(item.logs||[])) }));
  const next = JSON.parse(stack.pop());
  item.amount = next.amount||0; item.logs = next.logs||[];
  saveState(); render();
}

/* =========================================================
   Month / Tabs
========================================================= */
function updateHeader() {
  const d = getData();
  document.getElementById('monthDisplay').textContent =
    `${d.year}.${String(d.month).padStart(2,'0')}`;
}
function prevMonth() {
  if (currentMonthIdx <= 0) return;
  currentMonthIdx--; logOpenId = null;
  saveState(); updateHeader(); updateCompare(); render();
}
function nextMonth() {
  const cur = getData();
  let nm = cur.month+1, ny = cur.year;
  if (nm > 12) { nm=1; ny++; }
  const idx = months.findIndex(m => m.year===ny && m.month===nm);
  if (idx !== -1) { currentMonthIdx = idx; }
  else {
    months.push({
      year:ny, month:nm,
      fixed:    cur.fixed.map(i=>({...i, checked:false})),
      variable: cur.variable.map(i=>({...i, amount:0, checked:false, logs:[]})),
      incomes:  cur.incomes.map(i=>({...i, checked:false})),
      savings:  cur.savings.map(i=>({...i, amount:0, checked:false, logs:[]})),
    });
    currentMonthIdx = months.length-1;
  }
  logOpenId = null;
  saveState(); updateHeader(); updateCompare(); render();
}
function switchTab(tab, btn) {
  logOpenId = null;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
}

/* =========================================================
   Summary
========================================================= */
function updateCompare() {
  const bar = document.getElementById('compareBar');
  if (currentMonthIdx === 0) { bar.style.display='none'; return; }
  bar.style.display = 'block';
  const calc = d => {
    const income = d.incomes.reduce((s,i)=>s+i.amount,0);
    const paid   = d.fixed.filter(i=>i.checked).reduce((s,i)=>s+i.amount,0)
                 + d.variable.reduce((s,i)=>s+i.amount,0);
    return { income, paid, balance: income-paid };
  };
  const cur = calc(getData()), prv = calc(months[currentMonthIdx-1]);
  const diff = v => {
    const sign  = v>=0 ? '+' : '−';
    const color = v>=0 ? 'var(--income)' : 'var(--expense)';
    return `<span style="color:${color}">${sign}¥${Math.abs(v).toLocaleString()}</span>`;
  };
  document.getElementById('cmpIncome').innerHTML  = diff(cur.income  - prv.income);
  document.getElementById('cmpExpense').innerHTML = diff(cur.paid    - prv.paid);
  document.getElementById('cmpBalance').innerHTML = diff(cur.balance - prv.balance);
}

/* =========================================================
   Log Panel
========================================================= */
function toggleLog(id, e) {
  e.stopPropagation();
  logOpenId = (logOpenId===id) ? null : id;
  render();
  if (logOpenId===id) requestAnimationFrame(() => {
    document.getElementById('log-panel-'+id)?.scrollIntoView({ behavior:'smooth', block:'nearest' });
  });
}
function addLog(itemId, e) {
  e && e.stopPropagation();
  const noteEl = document.getElementById(`log-note-${itemId}`);
  const amtEl  = document.getElementById(`log-amt-${itemId}`);
  const note   = noteEl.value.trim();
  const amount = parseInt(amtEl.value)||0;
  if (!note && !amount) return;
  const item = findLoggableItem(itemId); if (!item) return;
  snapshotItem(item);
  item.logs.push({ id:nextLogId++, note: note||item.name, amount });
  item.amount = item.logs.reduce((s,l)=>s+(parseInt(l.amount)||0),0);
  noteEl.value=''; amtEl.value='';
  noteEl.blur(); amtEl.blur(); resetFocusAndZoom();
  saveState(); render();
}
function deleteLog(itemId, logId, e) {
  e.stopPropagation();
  confirmAction({
    actionKey:'deleteLog', requiresConfirm:true,
    title:'本当に削除しますか？',
    message:'この内訳を削除し、合計から金額を差し引きます。',
    callback:() => {
      const item = findLoggableItem(itemId); if (!item) return;
      const log  = item.logs.find(l=>l.id===logId); if (!log) return;
      snapshotItem(item);
      item.logs   = item.logs.filter(l=>l.id!==logId);
      item.amount = item.logs.reduce((s,l)=>s+(parseInt(l.amount)||0),0);
      saveState(); render();
    }
  });
}
function quickEditLogAmount(itemId, logId, e) {
  e.stopPropagation();
  const item = findLoggableItem(itemId);
  const log  = item?.logs.find(l=>l.id===logId); if (!log) return;
  const el   = e.currentTarget;
  const inp  = document.createElement('input');
  inp.type='number'; inp.value=log.amount; inp.className='log-entry-edit-amt';
  el.replaceWith(inp); inp.focus(); inp.select();
  const done = () => {
    const n = parseInt(inp.value)||0;
    if (n===log.amount) { render(); return; }
    snapshotItem(item);
    log.amount  = n;
    item.amount = item.logs.reduce((s,l)=>s+(parseInt(l.amount)||0),0);
    saveState(); render();
  };
  inp.addEventListener('blur', done);
  inp.addEventListener('keydown', ev => {
    if (ev.key==='Enter')  inp.blur();
    if (ev.key==='Escape') render();
  });
}
function buildLogPanel(item) {
  const logs  = item.logs||[];
  const entriesHtml = logs.length===0
    ? '<div class="empty-state">まだ内訳がありません</div>'
    : logs.map(log=>`
        <div class="log-entry">
          <span class="log-entry-note">${escHtml(log.note)}</span>
          <span class="log-entry-amt"
                onclick="quickEditLogAmount(${item.id},${log.id},event)">${fmt(log.amount)}</span>
          <button class="log-entry-del"
                  onclick="deleteLog(${item.id},${log.id},event)">✕</button>
        </div>`).join('');
  return `
    <div class="log-panel" id="log-panel-${item.id}">
      <div class="log-title">内訳メモ</div>
      <div class="log-entries">${entriesHtml}</div>
      <div class="log-add-row">
        <input class="log-add-note" id="log-note-${item.id}" placeholder="メモ（例：スーパー）"
               onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('log-amt-${item.id}').focus();}">
        <input class="log-add-amt" id="log-amt-${item.id}" placeholder="金額" type="number"
               onkeydown="if(event.key==='Enter'){event.preventDefault();addLog(${item.id},event);}">
        <button class="log-add-btn" onclick="addLog(${item.id},event)">+</button>
        <button class="log-add-btn undo-log-btn"
                onclick="undoItem(${item.id},event)" title="元に戻す"
                ${canUndoItem(item.id)?'':'disabled'}>↶</button>
        <button class="log-add-btn undo-log-btn"
                onclick="redoItem(${item.id},event)" title="やり直す"
                ${canRedoItem(item.id)?'':'disabled'}>↷</button>
      </div>
    </div>`;
}

/* =========================================================
   Render
========================================================= */
function renderList(listId, list, type) {
  const el = document.getElementById(listId);
  el.innerHTML = '';
  if (!list||list.length===0) {
    const emptyConfig = {
      fixed:    { icon:'🏠', title:'固定費がありません', sub:'家賃・光熱費など毎月決まった支出を追加しましょう' },
      variable: { icon:'🛒', title:'変動費がありません', sub:'食費・日用品など月ごとに変わる支出を追加しましょう' },
      income:   { icon:'💴', title:'収入がありません',   sub:'給与・副業など今月の収入を追加しましょう' },
      saving:   { icon:'🐷', title:'貯金がありません',   sub:'積立・貯蓄など目標の貯金を追加しましょう' },
    };
    const c = emptyConfig[type] || { icon:'📋', title:'項目がありません', sub:'下のフォームから追加してください' };
    el.innerHTML = `
      <div class="empty-state">
        <span class="empty-state-icon">${c.icon}</span>
        <span class="empty-state-title">${c.title}</span>
        <span class="empty-state-sub">${c.sub}</span>
      </div>`; return;
  }
  list.forEach(item => {
    const isFixed    = type==='fixed';
    const isIncome   = type==='income';
    const isSaving   = type==='saving';
    const isLoggable = isLoggableType(type);
    const isLogOpen  = isLoggable && logOpenId===item.id;

    const card = document.createElement('div');
    card.className = 'item'
      + (isFixed && item.checked ? ' checked' : '')
      + (isLogOpen ? ' log-open' : '');

    const amtClass = 'item-amount'
      + (isIncome          ? ' income-amt clickable' : '')
      + (isSaving          ? ' saving-amt clickable' : '')
      + (isFixed           ? ' clickable'            : '')
      + (isLoggable&&!isSaving ? ' clickable'        : '');

    const logBtn = isLoggable
      ? `<button class="item-btn log-btn" onclick="toggleLog(${item.id},event)" title="内訳">
           ${isLogOpen ? '▲' : '▼'}
         </button>`
      : '';

    card.innerHTML = `
      <div class="item-inner">
        ${isFixed?'<div class="checkbox"><div class="checkmark"></div></div>':''}
        <div class="item-name">${escHtml(item.name)}</div>
        <div class="${amtClass}" onclick="quickEditAmount(${item.id},'${type}',event)">
          ${item.amount ? fmt(item.amount) : '—'}
        </div>
        <div class="item-actions">
          ${logBtn}
          <button class="item-btn del-btn"
                  onclick="deleteItem('${type}',${item.id},event)" title="削除">✕</button>
        </div>
      </div>
      ${isLoggable ? buildLogPanel(item) : ''}
    `;

    if (isFixed) {
      card.querySelector('.item-inner').addEventListener('click', e => {
        if (e.target.closest('.item-btn')||e.target.closest('.item-amount')) return;
        item.checked = !item.checked;
        saveState(); render();
      });
    }
    el.appendChild(card);
  });
}

function render() {
  const d = getData();
  renderList('fixedList',    d.fixed,    'fixed');
  renderList('variableList', d.variable, 'variable');
  renderList('incomeList',   d.incomes,  'income');
  renderList('savingList',   d.savings,  'saving');

  document.getElementById('fixedCount').textContent    = d.fixed.length    ? ` ${d.fixed.length}`    : '';
  document.getElementById('variableCount').textContent = d.variable.length  ? ` ${d.variable.length}` : '';
  document.getElementById('incomeCount').textContent   = d.incomes.length   ? ` ${d.incomes.length}`  : '';
  document.getElementById('savingCount').textContent   = d.savings.length   ? ` ${d.savings.length}`  : '';

  const totalIncome   = d.incomes.reduce((s,i)=>s+i.amount,0);
  const paidFixed     = d.fixed.filter(i=>i.checked).reduce((s,i)=>s+i.amount,0);
  const totalVariable = d.variable.reduce((s,i)=>s+i.amount,0);
  const totalSaving   = d.savings.reduce((s,i)=>s+i.amount,0);
  const totalExpense  = paidFixed + totalVariable;
  const balance       = totalIncome - totalExpense;

  document.getElementById('totalIncome').textContent  = fmt(totalIncome);
  document.getElementById('totalExpense').textContent = fmt(totalExpense);
  document.getElementById('totalSaving').textContent  = fmt(totalSaving);

  const balEl = document.getElementById('balance');
  balEl.className   = 'balance-amount ' + (balance>=0?'positive':'negative');
  balEl.textContent = (balance<0?'−':'') + fmt(balance);

  const pct = totalIncome>0 ? Math.max(0,Math.min(100,balance/totalIncome*100)) : 0;
  const bar  = document.getElementById('progressBar');
  bar.style.width = pct+'%';
  bar.className   = 'progress-bar' + (pct<=20?' over':'');

  updateCompare();
}

/* =========================================================
   Add / Edit / Delete
========================================================= */
function quickEditAmount(id, type, e) {
  e.stopPropagation();
  const item = getList(type).find(i=>i.id===id);
  if (!item||item.checked) return;
  const el  = e.currentTarget;
  const inp = document.createElement('input');
  inp.type='number'; inp.value=item.amount;
  inp.style.cssText='width:100px;font-family:"DM Mono",monospace;font-size:16px;color:var(--text);border:none;border-bottom:1.5px solid var(--green-main);background:transparent;outline:none;text-align:right;';
  el.replaceWith(inp); inp.focus(); inp.select();
  const done = () => {
    const n = parseInt(inp.value)||0;
    if (n===item.amount) { render(); return; }
    if (isLoggableType(type)) snapshotItem(item);
    item.amount = n;
    saveState(); render();
  };
  inp.addEventListener('blur', done);
  inp.addEventListener('keydown', ev => {
    if (ev.key==='Enter')  inp.blur();
    if (ev.key==='Escape') render();
  });
}

function addLoggableItem(type) {
  const nameEl = document.getElementById(type+'Name');
  const amtEl  = document.getElementById(type+'Amount');
  const name   = nameEl.value.trim();
  const amount = parseInt(amtEl.value)||0;
  if (!name) { nameEl.focus(); return; }
  const list     = getList(type);
  const existing = list.find(i=>i.name===name);
  if (existing) {
    if (amount) {
      snapshotItem(existing);
      existing.logs.push({ id:nextLogId++, note:name, amount });
      existing.amount = existing.logs.reduce((s,l)=>s+(parseInt(l.amount)||0),0);
    }
    logOpenId = existing.id;
  } else {
    const it = { id:nextId++, name, amount, checked:false, logs:[] };
    if (amount) it.logs.push({ id:nextLogId++, note:name, amount });
    list.push(it);
    logOpenId = it.id;
  }
  nameEl.value=''; amtEl.value='';
  nameEl.blur(); amtEl.blur(); resetFocusAndZoom();
  saveState(); render();
}

function addStandardItem(type) {
  const nameEl = document.getElementById(type+'Name');
  const amtEl  = document.getElementById(type+'Amount');
  const name   = nameEl.value.trim();
  const amount = parseInt(amtEl.value)||0;
  if (!name) { nameEl.focus(); return; }
  const list     = getList(type);
  const existing = list.find(i=>i.name===name);
  if (existing) {
    showMergeToast(existing, amount, type);
  } else {
    list.push({ id:nextId++, name, amount, checked:false });
    saveState(); render();
  }
  nameEl.value=''; amtEl.value='';
  nameEl.blur(); amtEl.blur(); resetFocusAndZoom();
}

function deleteItem(type, id, e) {
  e.stopPropagation();
  confirmAction({
    actionKey:'deleteItem', requiresConfirm:true,
    title:'本当に削除しますか？',
    message:'この項目を削除します。内訳がある場合は内訳も一緒に削除されます。',
    callback:() => {
      const list  = getList(type);
      const index = list.findIndex(i=>i.id===id);
      if (index===-1) return;
      const deleted = JSON.parse(JSON.stringify(list[index]));
      list.splice(index,1);
      if (logOpenId===id) logOpenId=null;
      delete itemUndoStack[itemKey(id)];
      delete itemRedoStack[itemKey(id)];
      showDeleteUndoToast({ type, item:deleted, index, monthIdx:currentMonthIdx });
      saveState(); render();
    }
  });
}

/* =========================================================
   Merge / Undo toast
========================================================= */
function showMergeToast(existing, addAmount, type) {
  const newTotal = existing.amount + addAmount;
  document.getElementById('toastTitle').innerHTML =
    `「<strong>${escHtml(existing.name)}</strong>」が既に存在します`;
  document.getElementById('toastCalc').textContent  = `${fmt(existing.amount)} + ${fmt(addAmount)}`;
  document.getElementById('toastTotal').textContent = fmt(newTotal);
  document.getElementById('toastMergeBtn').onclick = () => {
    existing.amount += addAmount; dismissToast(); saveState(); render();
  };
  document.getElementById('toastAddBtn').onclick = () => {
    getList(type).push({ id:nextId++, name:existing.name, amount:addAmount, checked:false });
    dismissToast(); saveState(); render();
  };
  document.getElementById('toastOverlay').classList.add('visible');
}
function closeToast(e) { if (e.target.id==='toastOverlay') dismissToast(); }
function dismissToast() { document.getElementById('toastOverlay').classList.remove('visible'); }

function showDeleteUndoToast(deleted) {
  lastDeletedItem = deleted;
  const toast = document.getElementById('deleteUndoToast');
  const msg   = document.getElementById('deleteUndoMessage');
  if (!toast||!msg) return;
  msg.innerHTML = `「<strong>${escHtml(deleted.item.name)}</strong>」を削除しました`;
  toast.classList.add('visible');
  if (deleteUndoTimer) clearTimeout(deleteUndoTimer);
  deleteUndoTimer = setTimeout(() => toast.classList.remove('visible'), 7000);
}
function restoreDeletedItem() {
  if (!lastDeletedItem) return;
  const { type, item, index, monthIdx } = lastDeletedItem;
  const tm = months[monthIdx]; if (!tm) return;
  const list = getList(type, tm);
  list.splice(Math.max(0,Math.min(index,list.length)), 0, JSON.parse(JSON.stringify(item)));
  document.getElementById('deleteUndoToast').classList.remove('visible');
  if (deleteUndoTimer) clearTimeout(deleteUndoTimer);
  lastDeletedItem = null;
  currentMonthIdx = monthIdx; logOpenId = null;
  saveState(); updateHeader(); updateCompare(); render();
}

/* =========================================================
   Keyboard / Init
========================================================= */
['fixed','income'].forEach(t => {
  document.getElementById(t+'Amount')
    ?.addEventListener('keydown', e => { if (e.key==='Enter') addStandardItem(t); });
});
['variable','saving'].forEach(t => {
  [t+'Name',t+'Amount'].forEach(id => {
    document.getElementById(id)
      ?.addEventListener('keydown', e => { if (e.key==='Enter') addLoggableItem(t); });
  });
});

loadState();
updateHeader();
updateCompare();
render();

// Service Worker 登録（PWA・オフライン対応）
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
